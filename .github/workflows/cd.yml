name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: order/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test



      - name: Derive image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${repo}-order" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./order
          file: ./order/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Deploy dev to on-perm server
        uses: garygrossgarten/github-action-ssh@0.7.0
        with:
          command: |
            owner="$(echo "${${{ secrets.GITHUB_REPOSITORY_OWNER }}}" | tr '[:upper:]' '[:lower:]')"
            repo="$(echo "${${{ secrets.GITHUB_REPOSITORY}}#*/}" | tr '[:upper:]' '[:lower:]')" 
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u wafa458 --password-stdin; docker pull ghcr.io/${owner}/${repo}-order:latest; docker stop prod; docker container prune -f; docker run --name prod -d -p 127.0.0.1:9090:9090/tcp ghcr.io/${owner}/${repo}-order 
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          privateKey: ${{ secrets.SSH_PRIV_KEY }}
